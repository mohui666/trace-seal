name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build TraceSeal Windows package
        shell: pwsh
        run: .\scripts\build-windows.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TraceSeal-Windows
          path: desktop/electron/out/make/**/TraceSeal-Setup.exe
