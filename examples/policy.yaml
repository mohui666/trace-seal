version: 1
mode: warn

domain_policy:
  allow_domains: ["localhost", "127.0.0.1", "::1", "*.trusted.test"]
  deny_domains: ["*.malware.test", "evil.example.com"]
  warn_domains: ["*.unknown.test"]
  allow_localhost: true
  allow_private_networks: false
  warn_on_unknown_external: true
  block_on_deny: false

rules:
  - id: deny-dangerous-delete
    description: Block recursive force delete
    match:
      event_type: shell
      command:
        contains: "rm -rf"
    risk_level: critical
    action: deny
    reason: Recursive force delete can remove protected workspace data
    suggested_policy: 'deny shell "rm -rf <path>/**"'

  - id: warn-env-write
    description: Warn on .env writes
    match:
      event_type: file.write
      path:
        glob: ".env*"
    risk_level: high
    action: warn
    reason: Writing environment files can corrupt secrets or config
    suggested_policy: 'deny file_write ".env*"'

  - id: cascade_config_corruption
    description: Warn when protected configuration is modified
    match:
      event_type: file.write
      path:
        regex: '(?:^|/)(?:config\.json|settings\.json|settings\.ya?ml)$'
    risk_level: high
    action: warn
    reason: Writing protected configuration can corrupt subsequent agent behavior
    suggested_policy: 'require_approval file_write "<protected-config>"'

  - id: require-sensitive-read-approval
    description: Sensitive file reads need approval
    match:
      event_type: file.read
      path:
        contains_any: [".env", "secret", "token", "password", ".pem", ".key"]
    risk_level: high
    action: require_approval
    reason: Reading sensitive files can expose credentials
    suggested_policy: 'require_approval file_read "<sensitive-path>"'

  - id: domain_denylist_match
    description: Warn on explicitly denied domains
    match:
      event_type:
        any_of: [http, network.http]
      host:
        glob: "*.malware.test"
    risk_level: critical
    action: warn
    reason: HTTP request targets a denylisted domain
    suggested_policy: 'deny http host "*.malware.test"'

  - id: domain_warnlist_match
    description: Warn on domains requiring review
    match:
      event_type:
        any_of: [http, network.http]
      host:
        glob: "*.unknown.test"
    risk_level: high
    action: warn
    reason: HTTP request targets a warnlisted domain
    suggested_policy: 'require_approval http host "*.unknown.test"'

  - id: warn-sensitive-http
    description: Warn on sensitive HTTP requests
    match:
      event_type:
        any_of: [http, network.http]
      method:
        any_of: [POST, PUT, PATCH]
      sensitive: true
    risk_level: high
    action: warn
    reason: HTTP request may carry sensitive data
    suggested_policy: 'require_approval http "<method> <url>"'

  - id: warn-insecure-http
    description: Warn on plaintext HTTP
    match:
      event_type:
        any_of: [http, network.http]
      url:
        contains: "http://"
    risk_level: medium
    action: warn
    reason: Plaintext HTTP can expose request metadata
    suggested_policy: 'require_approval http "http://*/**"'

  - id: domain_localhost_allowed
    description: Allow localhost and loopback traffic
    match:
      event_type:
        any_of: [http, network.http]
      host_class:
        any_of: [localhost, loopback]
    risk_level: low
    action: allow
    reason: Localhost traffic is allowed for local test servers
    suggested_policy: 'allow http host localhost'

  - id: domain_allowlist_match
    description: Allow configured trusted domains
    match:
      event_type:
        any_of: [http, network.http]
      host_allowed: true
    risk_level: low
    action: allow
    reason: HTTP request target is present in the domain allowlist
    suggested_policy: 'allow http host "<domain>"'

  - id: domain_unknown_external
    description: Warn on external hosts absent from the allowlist
    match:
      event_type:
        any_of: [http, network.http]
      host_class:
        any_of: [external, ip]
      host_allowed: false
    risk_level: medium
    action: warn
    reason: HTTP request targets an external domain not present in the allowlist
    suggested_policy: add host to allow_domains or require approval

  - id: warn-git-force-with-lease
    description: Warn before rewriting remote history with lease
    match:
      event_type: shell
      command:
        contains: "--force-with-lease"
    risk_level: high
    action: warn
    reason: Force-with-lease can still rewrite remote history
    suggested_policy: 'require_approval git "push --force-with-lease"'

  - id: warn-git-mirror-push
    description: Warn before mirroring every remote ref
    match:
      event_type: shell
      command:
        contains: "--mirror"
    risk_level: critical
    action: warn
    reason: Mirror push can overwrite remote refs
    suggested_policy: 'deny git "push --mirror"'

  - id: warn-git-delete-remote-branch
    description: Warn before deleting a remote branch
    match:
      event_type: shell
      command:
        regex: '\bgit\s+push\b.*(?:--delete|\s:[^\s]+)'
    risk_level: critical
    action: warn
    reason: Deleting a remote branch can remove shared work
    suggested_policy: 'require_approval git "push --delete"'

  - id: warn-git-force-refspec
    description: Warn before a plus-prefixed forced ref update
    match:
      event_type: shell
      command:
        regex: '\bgit\s+push\b.*\s\+[^\s]+'
    risk_level: critical
    action: warn
    reason: Plus-prefixed refspec can force-update remote refs
    suggested_policy: 'deny git "push +<refspec>"'

  - id: warn-git-force-push
    description: Warn before force-pushing remote history
    match:
      event_type: shell
      command:
        regex: '(?:^|\s)(?:--force|-f)(?:\s|$)'
    risk_level: critical
    action: warn
    reason: Force push can rewrite remote history and disrupt collaborators
    suggested_policy: 'deny git "push --force"'

  - id: warn-git-bulk-push
    description: Warn before publishing all branches or tags
    match:
      event_type: shell
      command:
        regex: '(?:^|\s)--(?:all|tags)(?:\s|$)'
    risk_level: high
    action: warn
    reason: Pushing all branches or tags can publish more refs than intended
    suggested_policy: 'require_approval git "push --all/--tags"'

  - id: warn-git-push
    description: Warn before publishing repository state
    match:
      event_type: shell
      command:
        contains: "git push"
    risk_level: high
    action: warn
    reason: Git push publishes local code or history to a remote repository
    suggested_policy: 'require_approval git "push"'

  - id: cascade_failure_detected
    description: Require review for three or more ordered risk stages in one run
    match:
      event_type: run.cascade
    risk_level: high
    action: require_approval
    reason: Multiple independent risk events form a cascading incident
    suggested_policy: 'require_approval cascade "3+ ordered risk stages"'
