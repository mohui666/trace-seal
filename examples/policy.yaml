version: 1
mode: warn

rules:
  - id: deny-dangerous-delete
    description: Block recursive force delete
    match:
      event_type: shell
      command:
        contains: "rm -rf"
    risk_level: critical
    action: deny
    reason: Recursive force delete can remove protected workspace data
    suggested_policy: 'deny shell "rm -rf <path>/**"'

  - id: warn-env-write
    description: Warn on .env writes
    match:
      event_type: file.write
      path:
        glob: ".env*"
    risk_level: high
    action: warn
    reason: Writing environment files can corrupt secrets or config
    suggested_policy: 'deny file_write ".env*"'

  - id: require-sensitive-read-approval
    description: Sensitive file reads need approval
    match:
      event_type: file.read
      path:
        contains_any: [".env", "secret", "token", "password", ".pem", ".key"]
    risk_level: high
    action: require_approval
    reason: Reading sensitive files can expose credentials
    suggested_policy: 'require_approval file_read "<sensitive-path>"'

  - id: warn-sensitive-http
    description: Warn on sensitive HTTP requests
    match:
      event_type:
        any_of: [http, network.http]
      method:
        any_of: [POST, PUT, PATCH]
      sensitive: true
    risk_level: high
    action: warn
    reason: HTTP request may carry sensitive data
    suggested_policy: 'require_approval http "<method> <url>"'

  - id: warn-insecure-http
    description: Warn on plaintext HTTP
    match:
      event_type:
        any_of: [http, network.http]
      url:
        contains: "http://"
    risk_level: medium
    action: warn
    reason: Plaintext HTTP can expose request metadata
    suggested_policy: 'require_approval http "http://*/**"'

  - id: warn-git-force-with-lease
    description: Warn before rewriting remote history with lease
    match:
      event_type: shell
      command:
        contains: "--force-with-lease"
    risk_level: high
    action: warn
    reason: Force-with-lease can still rewrite remote history
    suggested_policy: 'require_approval git "push --force-with-lease"'

  - id: warn-git-mirror-push
    description: Warn before mirroring every remote ref
    match:
      event_type: shell
      command:
        contains: "--mirror"
    risk_level: critical
    action: warn
    reason: Mirror push can overwrite remote refs
    suggested_policy: 'deny git "push --mirror"'

  - id: warn-git-delete-remote-branch
    description: Warn before deleting a remote branch
    match:
      event_type: shell
      command:
        regex: '\bgit\s+push\b.*(?:--delete|\s:[^\s]+)'
    risk_level: critical
    action: warn
    reason: Deleting a remote branch can remove shared work
    suggested_policy: 'require_approval git "push --delete"'

  - id: warn-git-force-refspec
    description: Warn before a plus-prefixed forced ref update
    match:
      event_type: shell
      command:
        regex: '\bgit\s+push\b.*\s\+[^\s]+'
    risk_level: critical
    action: warn
    reason: Plus-prefixed refspec can force-update remote refs
    suggested_policy: 'deny git "push +<refspec>"'

  - id: warn-git-force-push
    description: Warn before force-pushing remote history
    match:
      event_type: shell
      command:
        regex: '(?:^|\s)(?:--force|-f)(?:\s|$)'
    risk_level: critical
    action: warn
    reason: Force push can rewrite remote history and disrupt collaborators
    suggested_policy: 'deny git "push --force"'

  - id: warn-git-bulk-push
    description: Warn before publishing all branches or tags
    match:
      event_type: shell
      command:
        regex: '(?:^|\s)--(?:all|tags)(?:\s|$)'
    risk_level: high
    action: warn
    reason: Pushing all branches or tags can publish more refs than intended
    suggested_policy: 'require_approval git "push --all/--tags"'

  - id: warn-git-push
    description: Warn before publishing repository state
    match:
      event_type: shell
      command:
        contains: "git push"
    risk_level: high
    action: warn
    reason: Git push publishes local code or history to a remote repository
    suggested_policy: 'require_approval git "push"'
